<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="-apple-system, 'Microsoft YaHei', sans-serif">
  <style>
    .title { font-size: 16px; font-weight: bold; fill: #111; }
    .lbl { font-size: 13px; fill: #222; }
    .small { font-size: 11px; fill: #555; }
    .cell { fill: #ffffff; stroke: #94a3b8; stroke-width: 1; }
    .head { fill: #f1f5f9; stroke: #475569; stroke-width: 1; }
    .hit { fill: #dcfce7; stroke: #16a34a; }
    .evict { fill: #fee2e2; stroke: #dc2626; }
    .fill { fill: #fef6e4; stroke: #d97706; }
    .num { font-size: 12px; fill: #111; text-anchor: middle; }
    .ann { font-size: 11px; fill: #ef4444; }
  </style>

  <text x="400" y="26" text-anchor="middle" class="title">LRU 计数器手动推演 · 4 路组相联(LRU 位 = log₂4 = 2 位)</text>
  <text x="400" y="46" text-anchor="middle" class="small">访问序列(均映射到同一组): 1 → 2 → 3 → 4 → 1 → 5 → 1 → 2</text>
  <text x="400" y="62" text-anchor="middle" class="small">格式: (块号, LRU 计数值) · 计数 0 = 最新访问 · 计数 3 = 最旧</text>

  <!-- Header -->
  <g transform="translate(40,90)">
    <rect x="0" y="0" width="90" height="32" class="head"/>
    <text x="45" y="20" class="num" font-weight="bold">操作</text>
    <rect x="90" y="0" width="80" height="32" class="head"/>
    <text x="130" y="20" class="num" font-weight="bold">行 0</text>
    <rect x="170" y="0" width="80" height="32" class="head"/>
    <text x="210" y="20" class="num" font-weight="bold">行 1</text>
    <rect x="250" y="0" width="80" height="32" class="head"/>
    <text x="290" y="20" class="num" font-weight="bold">行 2</text>
    <rect x="330" y="0" width="80" height="32" class="head"/>
    <text x="370" y="20" class="num" font-weight="bold">行 3</text>
    <rect x="410" y="0" width="310" height="32" class="head"/>
    <text x="565" y="20" class="num" font-weight="bold">说明(规则触发)</text>
  </g>

  <!-- Step 1: 访问 1 -->
  <g transform="translate(40,122)">
    <rect x="0" y="0" width="90" height="32" class="cell"/>
    <text x="45" y="20" class="num">访 1</text>
    <rect x="90" y="0" width="80" height="32" class="fill"/>
    <text x="130" y="20" class="num">(1, 0)</text>
    <rect x="170" y="0" width="80" height="32" class="cell"/>
    <text x="210" y="20" class="num">—</text>
    <rect x="250" y="0" width="80" height="32" class="cell"/>
    <text x="290" y="20" class="num">—</text>
    <rect x="330" y="0" width="80" height="32" class="cell"/>
    <text x="370" y="20" class="num">—</text>
    <rect x="410" y="0" width="310" height="32" class="cell"/>
    <text x="420" y="20" class="small">规则②(缺失+空闲): 新行计数 0</text>
  </g>

  <!-- Step 2: 访问 2 -->
  <g transform="translate(40,154)">
    <rect x="0" y="0" width="90" height="32" class="cell"/>
    <text x="45" y="20" class="num">访 2</text>
    <rect x="90" y="0" width="80" height="32" class="cell"/>
    <text x="130" y="20" class="num">(1, 1)</text>
    <rect x="170" y="0" width="80" height="32" class="fill"/>
    <text x="210" y="20" class="num">(2, 0)</text>
    <rect x="250" y="0" width="80" height="32" class="cell"/>
    <text x="290" y="20" class="num">—</text>
    <rect x="330" y="0" width="80" height="32" class="cell"/>
    <text x="370" y="20" class="num">—</text>
    <rect x="410" y="0" width="310" height="32" class="cell"/>
    <text x="420" y="20" class="small">规则②: 新行 0, 其他非空闲行 +1</text>
  </g>

  <!-- Step 3: 访问 3 -->
  <g transform="translate(40,186)">
    <rect x="0" y="0" width="90" height="32" class="cell"/>
    <text x="45" y="20" class="num">访 3</text>
    <rect x="90" y="0" width="80" height="32" class="cell"/>
    <text x="130" y="20" class="num">(1, 2)</text>
    <rect x="170" y="0" width="80" height="32" class="cell"/>
    <text x="210" y="20" class="num">(2, 1)</text>
    <rect x="250" y="0" width="80" height="32" class="fill"/>
    <text x="290" y="20" class="num">(3, 0)</text>
    <rect x="330" y="0" width="80" height="32" class="cell"/>
    <text x="370" y="20" class="num">—</text>
    <rect x="410" y="0" width="310" height="32" class="cell"/>
    <text x="420" y="20" class="small">规则②: 新行 0, 其他 +1</text>
  </g>

  <!-- Step 4: 访问 4 -->
  <g transform="translate(40,218)">
    <rect x="0" y="0" width="90" height="32" class="cell"/>
    <text x="45" y="20" class="num">访 4</text>
    <rect x="90" y="0" width="80" height="32" class="cell"/>
    <text x="130" y="20" class="num">(1, 3)</text>
    <rect x="170" y="0" width="80" height="32" class="cell"/>
    <text x="210" y="20" class="num">(2, 2)</text>
    <rect x="250" y="0" width="80" height="32" class="cell"/>
    <text x="290" y="20" class="num">(3, 1)</text>
    <rect x="330" y="0" width="80" height="32" class="fill"/>
    <text x="370" y="20" class="num">(4, 0)</text>
    <rect x="410" y="0" width="310" height="32" class="cell"/>
    <text x="420" y="20" class="small">规则②: 装满了,行 0 计数到 3(最旧)</text>
  </g>

  <!-- Step 5: 访问 1 (HIT) -->
  <g transform="translate(40,250)">
    <rect x="0" y="0" width="90" height="32" class="hit"/>
    <text x="45" y="20" class="num">访 1 ✅命中</text>
    <rect x="90" y="0" width="80" height="32" class="hit"/>
    <text x="130" y="20" class="num" font-weight="bold">(1, 0)</text>
    <rect x="170" y="0" width="80" height="32" class="cell"/>
    <text x="210" y="20" class="num">(2, 3)</text>
    <rect x="250" y="0" width="80" height="32" class="cell"/>
    <text x="290" y="20" class="num">(3, 2)</text>
    <rect x="330" y="0" width="80" height="32" class="cell"/>
    <text x="370" y="20" class="num">(4, 1)</text>
    <rect x="410" y="0" width="310" height="32" class="cell"/>
    <text x="420" y="20" class="ann">规则①命中: 行 0 清 0;比原值 3 小的(2,1,0)全 +1</text>
  </g>

  <!-- Step 6: 访问 5 (MISS + full) -->
  <g transform="translate(40,282)">
    <rect x="0" y="0" width="90" height="32" class="evict"/>
    <text x="45" y="20" class="num">访 5 ❌满</text>
    <rect x="90" y="0" width="80" height="32" class="cell"/>
    <text x="130" y="20" class="num">(1, 1)</text>
    <rect x="170" y="0" width="80" height="32" class="evict"/>
    <text x="210" y="20" class="num" font-weight="bold">(5, 0)</text>
    <rect x="250" y="0" width="80" height="32" class="cell"/>
    <text x="290" y="20" class="num">(3, 3)</text>
    <rect x="330" y="0" width="80" height="32" class="cell"/>
    <text x="370" y="20" class="num">(4, 2)</text>
    <rect x="410" y="0" width="310" height="32" class="cell"/>
    <text x="420" y="20" class="ann">规则③缺失+满: 换计数最大(行 1, 值=3); 新行 0; 其余 +1</text>
  </g>

  <!-- Step 7: 访问 1 (HIT) -->
  <g transform="translate(40,314)">
    <rect x="0" y="0" width="90" height="32" class="hit"/>
    <text x="45" y="20" class="num">访 1 ✅命中</text>
    <rect x="90" y="0" width="80" height="32" class="hit"/>
    <text x="130" y="20" class="num" font-weight="bold">(1, 0)</text>
    <rect x="170" y="0" width="80" height="32" class="cell"/>
    <text x="210" y="20" class="num">(5, 1)</text>
    <rect x="250" y="0" width="80" height="32" class="cell"/>
    <text x="290" y="20" class="num">(3, 3)</text>
    <rect x="330" y="0" width="80" height="32" class="cell"/>
    <text x="370" y="20" class="num">(4, 2)</text>
    <rect x="410" y="0" width="310" height="32" class="cell"/>
    <text x="420" y="20" class="ann">规则①命中: 行 0(值=1)清 0;比 1 小的(0=行5之前)+1</text>
  </g>

  <!-- Step 8: 访问 2 (MISS + full) -->
  <g transform="translate(40,346)">
    <rect x="0" y="0" width="90" height="32" class="evict"/>
    <text x="45" y="20" class="num">访 2 ❌满</text>
    <rect x="90" y="0" width="80" height="32" class="cell"/>
    <text x="130" y="20" class="num">(1, 1)</text>
    <rect x="170" y="0" width="80" height="32" class="cell"/>
    <text x="210" y="20" class="num">(5, 2)</text>
    <rect x="250" y="0" width="80" height="32" class="evict"/>
    <text x="290" y="20" class="num" font-weight="bold">(2, 0)</text>
    <rect x="330" y="0" width="80" height="32" class="cell"/>
    <text x="370" y="20" class="num">(4, 3)</text>
    <rect x="410" y="0" width="310" height="32" class="cell"/>
    <text x="420" y="20" class="ann">规则③: 换最大(行 2 是 3,但前一步4=2, 重算: 行3=3换出);新0其余+1</text>
  </g>

  <!-- Rules box -->
  <g transform="translate(40,400)">
    <rect x="0" y="0" width="720" height="120" fill="#f0f9ff" stroke="#3b82f6" stroke-width="1" rx="4"/>
    <text x="16" y="22" class="lbl" font-weight="bold">📐 LRU 计数器三规则:</text>
    <text x="16" y="42" class="small">① 命中: 被命中行计数器 = 0;比原值小的计数器全部 +1;比原值大的不变</text>
    <text x="16" y="60" class="small">② 缺失 + 有空闲行: 新装入行计数器 = 0;其他非空闲行全部 +1</text>
    <text x="16" y="78" class="small">③ 缺失 + 无空闲行: 替换计数最大的行;新装入行计数器 = 0;其余全部 +1</text>
    <text x="16" y="102" class="ann">⚠️ 易错: 命中时只有"比原值小的"+1, 比原值大的不动!</text>
  </g>
</svg>
