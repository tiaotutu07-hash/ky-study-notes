<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, 'Microsoft YaHei', sans-serif">
  <style>
    .title { font-size: 16px; font-weight: bold; fill: #111; }
    .lbl { font-size: 12px; fill: #222; }
    .small { font-size: 11px; fill: #555; }
    .mb { fill: #f0e7ff; stroke: #7c3aed; }
    .cs { fill: #fef6e4; stroke: #d97706; }
    .cl { fill: #dcfce7; stroke: #16a34a; }
    .arr { stroke: #ef4444; stroke-width: 1.5; fill: none; marker-end: url(#tri); }
    .arr2 { stroke: #3b82f6; stroke-width: 1.5; fill: none; marker-end: url(#tri2); }
  </style>
  <defs>
    <marker id="tri" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#ef4444"/>
    </marker>
    <marker id="tri2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#3b82f6"/>
    </marker>
  </defs>

  <text x="400" y="26" text-anchor="middle" class="title">主存块 → Cache 三种映射方式对比(主存 16 块,Cache 4 行)</text>

  <!-- Direct mapped -->
  <text x="130" y="60" text-anchor="middle" class="lbl" font-weight="bold">① 直接映射</text>
  <text x="130" y="76" text-anchor="middle" class="small">块号 mod 4</text>

  <g id="direct">
    <!-- Main memory -->
    <text x="40" y="100" class="small">主存:</text>
    <g>
      <rect x="40" y="108" width="20" height="20" class="mb"/><text x="50" y="123" text-anchor="middle" class="small">0</text>
      <rect x="40" y="130" width="20" height="20" class="mb"/><text x="50" y="145" text-anchor="middle" class="small">1</text>
      <rect x="40" y="152" width="20" height="20" class="mb"/><text x="50" y="167" text-anchor="middle" class="small">2</text>
      <rect x="40" y="174" width="20" height="20" class="mb"/><text x="50" y="189" text-anchor="middle" class="small">3</text>
      <rect x="40" y="196" width="20" height="20" class="mb"/><text x="50" y="211" text-anchor="middle" class="small">4</text>
      <rect x="40" y="218" width="20" height="20" class="mb"/><text x="50" y="233" text-anchor="middle" class="small">5</text>
      <rect x="40" y="240" width="20" height="20" class="mb"/><text x="50" y="255" text-anchor="middle" class="small">6</text>
      <rect x="40" y="262" width="20" height="20" class="mb"/><text x="50" y="277" text-anchor="middle" class="small">7</text>
      <text x="50" y="295" text-anchor="middle" class="small">⋮</text>
    </g>
    <!-- Cache -->
    <text x="195" y="100" class="small">Cache(4 行):</text>
    <rect x="195" y="108" width="44" height="20" class="cl"/><text x="217" y="123" text-anchor="middle" class="small">行 0</text>
    <rect x="195" y="130" width="44" height="20" class="cl"/><text x="217" y="145" text-anchor="middle" class="small">行 1</text>
    <rect x="195" y="152" width="44" height="20" class="cl"/><text x="217" y="167" text-anchor="middle" class="small">行 2</text>
    <rect x="195" y="174" width="44" height="20" class="cl"/><text x="217" y="189" text-anchor="middle" class="small">行 3</text>
    <!-- Arrows: block 0,4,8 -> line 0;  block 1,5 -> line 1 -->
    <path d="M 60 118 L 195 118" class="arr"/>
    <path d="M 60 206 L 195 122" class="arr"/>
    <path d="M 60 140 L 195 140" class="arr2"/>
    <path d="M 60 228 L 195 144" class="arr2"/>
    <text x="125" y="320" text-anchor="middle" class="small">块 0/4/8/12 → 行 0</text>
    <text x="125" y="336" text-anchor="middle" class="small">块 1/5/9/13 → 行 1</text>
  </g>

  <!-- Set associative -->
  <text x="400" y="60" text-anchor="middle" class="lbl" font-weight="bold">② 2 路组相联</text>
  <text x="400" y="76" text-anchor="middle" class="small">块号 mod 2 (组数=2,每组2行)</text>

  <g id="setassoc">
    <text x="310" y="100" class="small">主存:</text>
    <g>
      <rect x="310" y="108" width="20" height="20" class="mb"/><text x="320" y="123" text-anchor="middle" class="small">0</text>
      <rect x="310" y="130" width="20" height="20" class="mb"/><text x="320" y="145" text-anchor="middle" class="small">1</text>
      <rect x="310" y="152" width="20" height="20" class="mb"/><text x="320" y="167" text-anchor="middle" class="small">2</text>
      <rect x="310" y="174" width="20" height="20" class="mb"/><text x="320" y="189" text-anchor="middle" class="small">3</text>
      <rect x="310" y="196" width="20" height="20" class="mb"/><text x="320" y="211" text-anchor="middle" class="small">4</text>
      <rect x="310" y="218" width="20" height="20" class="mb"/><text x="320" y="233" text-anchor="middle" class="small">5</text>
      <text x="320" y="265" text-anchor="middle" class="small">⋮</text>
    </g>
    <!-- 2 sets -->
    <text x="455" y="100" class="small">Cache(2 组×2 行):</text>
    <rect x="455" y="108" width="60" height="44" class="cs"/>
    <text x="485" y="123" text-anchor="middle" class="small">组 0</text>
    <rect x="460" y="128" width="22" height="20" class="cl"/><text x="471" y="143" text-anchor="middle" class="small">L0</text>
    <rect x="488" y="128" width="22" height="20" class="cl"/><text x="499" y="143" text-anchor="middle" class="small">L1</text>

    <rect x="455" y="160" width="60" height="44" class="cs"/>
    <text x="485" y="175" text-anchor="middle" class="small">组 1</text>
    <rect x="460" y="180" width="22" height="20" class="cl"/><text x="471" y="195" text-anchor="middle" class="small">L0</text>
    <rect x="488" y="180" width="22" height="20" class="cl"/><text x="499" y="195" text-anchor="middle" class="small">L1</text>

    <path d="M 330 118 L 455 118" class="arr"/>
    <path d="M 330 206 L 455 120" class="arr"/>
    <path d="M 330 140 L 455 170" class="arr2"/>
    <path d="M 330 228 L 455 172" class="arr2"/>
    <text x="395" y="320" text-anchor="middle" class="small">块 0/2/4… → 组 0(组内任意行)</text>
    <text x="395" y="336" text-anchor="middle" class="small">块 1/3/5… → 组 1(组内任意行)</text>
  </g>

  <!-- Fully associative -->
  <text x="670" y="60" text-anchor="middle" class="lbl" font-weight="bold">③ 全相联</text>
  <text x="670" y="76" text-anchor="middle" class="small">任意块 → 任意行</text>

  <g id="fully">
    <text x="585" y="100" class="small">主存:</text>
    <g>
      <rect x="585" y="108" width="20" height="20" class="mb"/><text x="595" y="123" text-anchor="middle" class="small">0</text>
      <rect x="585" y="130" width="20" height="20" class="mb"/><text x="595" y="145" text-anchor="middle" class="small">1</text>
      <rect x="585" y="152" width="20" height="20" class="mb"/><text x="595" y="167" text-anchor="middle" class="small">2</text>
      <rect x="585" y="174" width="20" height="20" class="mb"/><text x="595" y="189" text-anchor="middle" class="small">3</text>
      <text x="595" y="225" text-anchor="middle" class="small">⋮</text>
    </g>
    <text x="725" y="100" class="small">Cache(1 组×4 行):</text>
    <rect x="725" y="108" width="50" height="100" class="cs"/>
    <rect x="730" y="115" width="40" height="20" class="cl"/><text x="750" y="130" text-anchor="middle" class="small">L0</text>
    <rect x="730" y="138" width="40" height="20" class="cl"/><text x="750" y="153" text-anchor="middle" class="small">L1</text>
    <rect x="730" y="161" width="40" height="20" class="cl"/><text x="750" y="176" text-anchor="middle" class="small">L2</text>
    <rect x="730" y="184" width="40" height="20" class="cl"/><text x="750" y="199" text-anchor="middle" class="small">L3</text>

    <path d="M 605 118 L 725 130" class="arr"/>
    <path d="M 605 140 L 725 155" class="arr"/>
    <path d="M 605 162 L 725 178" class="arr"/>
    <path d="M 605 184 L 725 195" class="arr"/>
    <text x="670" y="320" text-anchor="middle" class="small">每块都能去任一行</text>
    <text x="670" y="336" text-anchor="middle" class="small">无冲突,但比较器最多</text>
  </g>

  <!-- bottom -->
  <rect x="40" y="380" width="720" height="80" fill="#f0f9ff" stroke="#3b82f6" stroke-width="1" rx="4"/>
  <text x="56" y="402" class="lbl" font-weight="bold">三种映射的本质 = (S, E, B, m) 中 E 的取值:</text>
  <text x="56" y="420" class="small">• 直接映射 E = 1 → 每个块只有 1 个可去的位置(冲突最多,硬件最简单)</text>
  <text x="56" y="436" class="small">• 组相联 1 &lt; E &lt; C/B → 块可去 E 个位置(折中)</text>
  <text x="56" y="452" class="small">• 全相联 E = C/B(S=1) → 块可去所有位置(冲突最少,硬件最贵)</text>
</svg>
